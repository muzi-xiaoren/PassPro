name: Build All Platforms

# 推到 main / 手动触发时，并行构建 Android / Windows / macOS / iOS，
# 产物上传为可下载 artifact（在本次 Actions 运行页面底部下载）。
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]          # 推 v 开头的 tag（如 v0.1.0）→ 构建后自动发 Release
  workflow_dispatch:

permissions:
  contents: write           # 允许 GITHUB_TOKEN 创建 Release / 上传附件

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: PassPro-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip Windows build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath PassPro-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PassPro-Windows
          path: PassPro-Windows.zip
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent *.app "$GITHUB_WORKSPACE/PassPro-macOS.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: PassPro-macOS
          path: PassPro-macOS.zip
          if-no-files-found: error

  ios:
    name: iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # 未签名构建：能产出 .app，但需 Apple 开发者证书才能装真机
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned .app
        run: |
          cd build/ios/iphoneos
          ditto -c -k --sequesterRsrc --keepParent Runner.app "$GITHUB_WORKSPACE/PassPro-iOS-unsigned.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: PassPro-iOS-unsigned
          path: PassPro-iOS-unsigned.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [ android, windows, macos, ios ]
    # 仅当推送的是 v 开头的 tag 时才发布 Release（普通 push 到 main 只产 artifact）
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect & rename release files
        run: |
          mkdir -p release
          cp artifacts/PassPro-Android-APK/app-release.apk release/PassPro-Android.apk
          cp artifacts/PassPro-Windows/PassPro-Windows.zip          release/
          cp artifacts/PassPro-macOS/PassPro-macOS.zip              release/
          cp artifacts/PassPro-iOS-unsigned/PassPro-iOS-unsigned.zip release/
          ls -lh release
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true   # 自动根据提交生成 Release 说明
