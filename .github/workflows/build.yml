name: Build All Platforms

# 推到 main / 手动触发时，并行构建 Android / Windows / macOS / Linux / iOS，
# 产物上传为可下载 artifact（在本次 Actions 运行页面底部下载）。
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]          # 推 v 开头的 tag（如 v0.1.0）→ 构建后自动发 Release
  workflow_dispatch:

permissions:
  contents: write           # 允许 GITHUB_TOKEN 创建 Release / 上传附件

jobs:
  android:
    name: Android APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - name: Rename Android APKs
        run: |
          mkdir -p dist/android
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/android/PassPro-Android-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/android/PassPro-Android-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/android/PassPro-Android-x64.apk
      - uses: actions/upload-artifact@v7
        with:
          name: PassPro-Android-APKs
          path: dist/android/*.apk
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip Windows build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath PassPro-Windows.zip
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches.Groups[1].Value.Split('+')[0]
          $script = @"
          [Setup]
          AppId={{9E3DE0D9-2FB1-4D67-A5B4-4E72D9EE0F0A}
          AppName=PassPro
          AppVersion=$version
          DefaultDirName={autopf}\PassPro
          DefaultGroupName=PassPro
          OutputDir=$env:GITHUB_WORKSPACE
          OutputBaseFilename=PassPro-Setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern

          [Files]
          Source: "$env:GITHUB_WORKSPACE\build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\PassPro"; Filename: "{app}\PassPro.exe"
          Name: "{autodesktop}\PassPro"; Filename: "{app}\PassPro.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked

          [Run]
          Filename: "{app}\PassPro.exe"; Description: "Launch PassPro"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path installer.iss -Value $script -Encoding UTF8
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss
      - uses: actions/upload-artifact@v7
        with:
          name: PassPro-Windows
          path: |
            PassPro-Windows.zip
            PassPro-Setup.exe
          if-no-files-found: error

  macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # macOS 构建默认即 arm64+x64 通用二进制；Flutter 3.44 起 --target-platform 已移除
      - run: flutter build macos --release
      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent *.app "$GITHUB_WORKSPACE/PassPro-macOS.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: PassPro-macOS
          path: PassPro-macOS.zip
          if-no-files-found: error

  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev zip
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Zip Linux build
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/PassPro-Linux-x64.zip" .
      - uses: actions/upload-artifact@v7
        with:
          name: PassPro-Linux-x64
          path: PassPro-Linux-x64.zip
          if-no-files-found: error

  ios:
    name: iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # 未签名构建：能产出 .app，但需 Apple 开发者证书才能装真机
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned .app
        run: |
          cd build/ios/iphoneos
          ditto -c -k --sequesterRsrc --keepParent Runner.app "$GITHUB_WORKSPACE/PassPro-iOS-unsigned.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: PassPro-iOS-unsigned
          path: PassPro-iOS-unsigned.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [ android, windows, macos, linux, ios ]
    # 仅当推送的是 v 开头的 tag 时才发布 Release（普通 push 到 main 只产 artifact）
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect & rename release files
        run: |
          mkdir -p release
          cp artifacts/PassPro-Android-APKs/*.apk                     release/
          cp artifacts/PassPro-Windows/PassPro-Windows.zip            release/
          cp artifacts/PassPro-Windows/PassPro-Setup.exe              release/
          cp artifacts/PassPro-macOS/PassPro-macOS.zip                release/
          cp artifacts/PassPro-Linux-x64/PassPro-Linux-x64.zip        release/
          cp artifacts/PassPro-iOS-unsigned/PassPro-iOS-unsigned.zip  release/
          ls -lh release
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true   # 自动根据提交生成 Release 说明
