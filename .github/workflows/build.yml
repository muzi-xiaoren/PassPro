name: Build All Platforms

# 推到 main / 手动触发时，并行构建 Android / Windows / macOS / iOS，
# 产物上传为可下载 artifact（在本次 Actions 运行页面底部下载）。
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: PassPro-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip Windows build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath PassPro-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PassPro-Windows
          path: PassPro-Windows.zip
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent *.app "$GITHUB_WORKSPACE/PassPro-macOS.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: PassPro-macOS
          path: PassPro-macOS.zip
          if-no-files-found: error

  ios:
    name: iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # 未签名构建：能产出 .app，但需 Apple 开发者证书才能装真机
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned .app
        run: |
          cd build/ios/iphoneos
          ditto -c -k --sequesterRsrc --keepParent Runner.app "$GITHUB_WORKSPACE/PassPro-iOS-unsigned.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: PassPro-iOS-unsigned
          path: PassPro-iOS-unsigned.zip
          if-no-files-found: error
