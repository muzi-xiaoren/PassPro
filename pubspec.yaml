name: passpro
description: 跨平台本地密码管理器，兼容旧 Python Fernet 加密文件，支持 GitHub/Gitee 双仓库同步。
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # 加密：手写 Fernet 兼容算法，仅依赖基础原语
  crypto: ^3.0.3            # SHA-256 / HMAC
  pointycastle: ^3.9.1      # AES-CBC + PKCS7

  # 存储 & 路径
  path: ^1.9.0
  path_provider: ^2.1.3     # 各平台 app 数据目录

  # 安全凭据（PAT 存 OS Keychain）
  flutter_secure_storage: ^9.2.2

  # 本地设置持久化
  shared_preferences: ^2.2.3

  # HTTP（同步用，GitHub/Gitee REST API）
  http: ^1.2.1

  # UI 状态管理（轻量）
  provider: ^6.1.2

  # 多语言 (i18n)
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true        # 启用 gen-l10n（ARB → AppLocalizations）

# 应用图标：源图 assets/icon/app_icon.png（1024x1024）。
# 生成命令：dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true        # App Store 不允许 iOS 图标带 alpha 通道
  macos:
    generate: true
  windows:
    generate: true
    icon_size: 256
  web:
    generate: false
